    <script>
        // PINCODE AUTOFILL SCRIPT
        document.addEventListener("DOMContentLoaded", function() {
            var pinInput = document.getElementById("pin");
            var cityInput = document.getElementById("city");
            var stateSelect = document.getElementById("state");

            pinInput.addEventListener("keyup", function() {
                var pin = this.value.trim();
                if (pin.length === 6 && /^[0-9]{6}$/.test(pin)) {
                    fetch("https://api.postalpincode.in/pincode/" + pin)
                        .then(response => response.json())
                        .then(data => {
                            if (data[0].Status === "Success") {
                                var postOffice = data[0].PostOffice[0];
                                cityInput.value = postOffice.District;
                                for (var i = 0; i < stateSelect.options.length; i++) {
                                    if (stateSelect.options[i].text === postOffice.State) {
                                        stateSelect.selectedIndex = i;
                                        break;
                                    }
                                }
                            }
                        })
                        .catch(() => {});
                }
            });
        });

        // THE SAVE FUNCTION
        function saveAddress() {
            var nameValue = document.getElementById('name').value;
            var numValue = document.getElementById('number').value;
            var pinValue = document.getElementById('pin').value;
            var cityValue = document.getElementById('city').value;
            var stateValue = document.getElementById('state').value;
            var flatValue = document.getElementById('flat').value;
            var areaValue = document.getElementById('area').value;

            if (!nameValue || !numValue || !flatValue) {
                alert("Please fill in all required details");
                return;
            }

            var fullAddress = flatValue + ", " + areaValue + ", " + cityValue + ", " + stateValue + " - " + pinValue;

            // Save using standard keys for summary.html compatibility
            localStorage.setItem('cust_name', nameValue);
            localStorage.setItem('cust_contact', numValue);
            localStorage.setItem('full_address', fullAddress);

            window.location.href = "summary.html";
        }
    </script>
