
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Placed</title>
    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f5f7fa;
            font-family:Arial, sans-serif;
            overflow:hidden;
        }
        
        .card{
            background:#fff;
            width:90%;
            max-width:420px;
            padding:40px 25px;
            border-radius:18px;
            box-shadow:0 10px 30px rgba(0,0,0,0.12);
            text-align:center;
            position:relative;
        }
        
        .checkmark-circle{
            width:110px;
            height:110px;
            margin:0 auto 25px;
            background:linear-gradient(135deg,#36d399,#10b981);
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            animation:pop 0.6s ease forwards;
        }
        
        .checkmark{
            font-size:60px;
            color:#fff;
            transform:scale(0);
            animation:tick 0.4s 0.5s forwards;
        }
        
        @keyframes pop{
            0%{transform:scale(0);}
            100%{transform:scale(1);}
        }
        
        @keyframes tick{
            0%{transform:scale(0);}
            100%{transform:scale(1);}
        }
        
        h2{
            font-size:26px;
            margin-bottom:12px;
        }
        
        p{
            color:#555;
            font-size:16px;
        }
        
        .savings{
            color:#16a34a;
            font-weight:600;
            margin-top:8px;
        }
        
        /* Confetti */
        .confetti{
            position:absolute;
            width:8px;
            height:8px;
            background:red;
            top:0;
            animation:fall 2.5s linear forwards;
        }
        
        @keyframes fall{
            0%{transform:translateY(0) rotate(0);}
            100%{transform:translateY(500px) rotate(360deg); opacity:0;}
        }
    </style>
    
</head>
<body>

    <div class="card">
        <div class="checkmark-circle">
            <div class="checkmark">✓</div>
        </div>
    
        <h2>Order Placed Successfully</h2>
        <p>38 SuperCoins on the way</p>
        <p class="savings">You saved <span id="fghyhgh"></span></p>
    </div>

    <script>
        // Confetti generator
        function createConfetti(){
            const colors=["#f43f5e","#3b82f6","#facc15","#22c55e","#a855f7"];
            for(let i=0;i<25;i++){
                let conf=document.createElement("div");
                conf.classList.add("confetti");
                conf.style.left=Math.random()*100+"%";
                conf.style.background=colors[Math.floor(Math.random()*colors.length)];
                conf.style.animationDuration=(Math.random()*2+1)+"s";
                document.body.appendChild(conf);
        
                setTimeout(()=>{ conf.remove(); },3000);
            }
        }
        createConfetti();
        setTimeout(function(){
            window.location.href="thanku.html"; 
        },5000); 
    </script>
    <script defer src="assets/js/success.js"></script>

</body>
</html>
