<script>
function syncAndPay() {
    // 1. Get the price from the footer display
    var priceTag = document.getElementById('selling_price-footer');
    var priceValue = priceTag ? priceTag.innerText : (localStorage.getItem('p_price') || "0");
    
    // 2. Get the MRP for the display rows
    var mrpTag = document.getElementById('mrp-footer');
    var mrpValue = mrpTag ? mrpTag.innerText : (localStorage.getItem('p_mrp') || "0");

    // 3. Clean the strings (remove ₹ and commas) so the numbers work in the URL
    var cleanPrice = priceValue.replace(/[^0-9.]/g, '');
    var cleanMrp = mrpValue.replace(/[^0-9.]/g, '');

    // 4. Save to LocalStorage (as a backup/global sync)
    localStorage.setItem('GLOBAL_TOTAL', priceValue);

    // 5. Redirect to payments.html with URL parameters
    // This feeds the 'const price = urlParams1.get('price')' logic in your payments file
    window.location.href = 'payments.html?price=' + cleanPrice + '&mrp=' + cleanMrp;
}
</script>

        window.onload = function() {

            var el = document.getElementById("delivery-date");
            if (el) { el.innerHTML = "🚚 Delivery by <strong>" + deliveryDate + "</strong>"; }

            // 2. THE FORCE FIX (Wait 500ms to beat summary.js mistakes)
            setTimeout(function() {
                var savedName = localStorage.getItem('cust_name');
                var savedAddr = localStorage.getItem('full_address');
                var savedMob = localStorage.getItem('cust_contact');

                var nameEl = document.getElementById('customer-name');
                var addrEl = document.getElementById('customer-address');
                var mobEl = document.getElementById('customer-contact');

                if (nameEl && savedName) nameEl.innerText = savedName;
                if (mobEl && savedMob) mobEl.innerText = savedMob;
                
                if (addrEl && savedAddr && savedAddr.length > 5) {
                    addrEl.innerText = savedAddr;
                } else {
                    // FINAL ATTEMPT: Scan every div for the error text and replace it
                    var divs = document.getElementsByTagName('div');
                    for (var i = 0; i < divs.length; i++) {
                        if (divs[i].innerText === "Address not provided" || divs[i].textContent === "Address not provided") {
                            divs[i].innerText = savedAddr;
                        }
                    }
                }
            }, 500); 
        };
